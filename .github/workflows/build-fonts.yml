name: Build Fonts (字体转字库)

on:
  workflow_dispatch:
    inputs:
      font:
        description: '只构建指定字体（留空则构建全部）'
        required: false
        default: ''
  push:
    paths:
      - 'font_work/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 构建 XnaFontRebuilder
        working-directory: font_work/XnaFontRebuilder
        run: dotnet build -c Release

      - name: 生成所有字体
        shell: pwsh
        run: |
          # 进入工作目录
          Set-Location font_work

          # 读取配置
          $config = Get-Content config.json | ConvertFrom-Json

          # 确定要构建的字体列表
          $targetFont = '${{ github.event.inputs.font }}'
          if ($targetFont -ne '') {
            $fontsToBuild = @($targetFont)
          } else {
            $fontsToBuild = $config.fonts.PSObject.Properties.Name
          }

          # 查找 bmfont 可执行文件
          $bmfont = $null
          if (Test-Path ".\bmfont64.exe") { $bmfont = ".\bmfont64.exe" }
          elseif (Test-Path ".\bmfont64.com") { $bmfont = ".\bmfont64.com" }
          if (-not $bmfont) { throw "找不到 bmfont64.exe 或 bmfont64.com" }

          # XnaFontRebuilder DLL 路径
          $xnaDll = ".\XnaFontRebuilder\bin\Release\net8.0\XnaFontRebuilder.dll"
          if (-not (Test-Path $xnaDll)) { throw "找不到 XnaFontRebuilder.dll" }

          foreach ($fontName in $fontsToBuild) {
            Write-Host "========================================" -ForegroundColor Cyan
            Write-Host "开始构建字体: $fontName" -ForegroundColor Yellow

            $fontCfg = $config.fonts.$fontName
            if (-not $fontCfg) {
              Write-Host "  跳过: 配置中找不到 $fontName" -ForegroundColor Red
              continue
            }

            # 获取配置项
            $sourceFont = $fontCfg.sourceFont
            $cfgFile = $fontCfg.configFile
            $outputDir = $fontCfg.outputDir
            $txtFile = $fontCfg.txtFile
            $charInfo = $fontCfg.charInfoFile

            # 如果源字体不存在，尝试使用全局字体
            if (-not (Test-Path $sourceFont)) {
              Write-Host "  警告: 源字体不存在 $sourceFont，尝试使用全局 sourceFont" -ForegroundColor Yellow
              $sourceFont = $config.global.sourceFont
            }
            if (-not (Test-Path $sourceFont)) {
              Write-Host "  错误: 源字体不存在 $sourceFont，跳过 $fontName" -ForegroundColor Red
              continue
            }

            # 检查字符信息文件
            if (-not (Test-Path $charInfo)) {
              Write-Host "  错误: 字符信息文件不存在 $charInfo，跳过 $fontName" -ForegroundColor Red
              continue
            }

            # 确保输出目录存在
            if (-not (Test-Path $outputDir)) {
              New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
            }

            # 步骤1: 生成 BMFont 配置文件
            Write-Host "  [1/3] 生成配置文件: $cfgFile"
            dotnet $xnaDll --build-cfg-auto $charInfo $cfgFile $sourceFont
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  错误: 配置文件生成失败" -ForegroundColor Red
              continue
            }

            # 步骤2: 运行 BMFont - 强制使用 .fnt 扩展名
            $fntFile = "$fontName.fnt"
            $outputBase = Join-Path $outputDir $fntFile
            Write-Host "  [2/3] 运行 BMFont: $bmfont -c $cfgFile -o $outputBase"
            & $bmfont -c $cfgFile -o $outputBase
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  错误: BMFont 生成失败" -ForegroundColor Red
              continue
            }
            # 检查文件是否生成
            if (-not (Test-Path $outputBase)) {
              Write-Host "  错误: BMFont 未生成 $outputBase" -ForegroundColor Red
              continue
            }

            # 步骤3: 转换为 TXT
            $txtOutput = Join-Path $outputDir $txtFile
            Write-Host "  [3/3] 转换为 TXT: $txtOutput"
            dotnet $xnaDll --convert $outputBase $txtOutput --latin-compensation 0 --char-spacing 0
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  错误: TXT 转换失败" -ForegroundColor Red
              continue
            }

            # 删除临时配置文件
            if (Test-Path $cfgFile) {
              Remove-Item $cfgFile -Force
            }

            Write-Host "  ✅ $fontName 构建完成" -ForegroundColor Green
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 字体转字库
          path: |
            font_work/**/*.fnt
            font_work/**/*.png
            font_work/**/*.txt
          if-no-files-found: error

name: Build and Localize

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      config_style:
        description: '选择字体配置'
        required: true
        default: 'config-FABU.json'
        type: choice
        options:
          - config-FABU.json
          - config-ZIYONG.json

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    
    - name: Build XnaFontRebuilder
      run: |
        cd font_work\XnaFontRebuilder
        dotnet build -c Release
    
    - name: Generate fonts using FontXnaBuilder.ps1
      shell: pwsh
      run: |
        cd font_work
        $config = "${{ github.event.inputs.config_style }}"
        if (-not $config) { $config = "config-FABU.json" }
        Write-Host "使用配置文件: $config"
        .\FontXnaBuilder.ps1 -ConfigFile $config

    - name: 📤 Upload font intermediate files (.bmfc / .fnt / .png)
      uses: actions/upload-artifact@v7
      with:
        name: font-intermediate-files
        path: |
          font_work/*.bmfc
          font_work/*/*.fnt
          font_work/*/*.png
        if-no-files-found: warn

    - name: Build UnpackTerrariaTextAsset
      run: |
        cd UnpackTerrariaTextAsset
        dotnet build -c Release
    
    - name: Debug - Check directories and files
      run: |
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "---"
        Write-Host "Root directory contents:"
        Get-ChildItem
        Write-Host "---"
        Write-Host "Resources directory:"
        if (Test-Path Resources) { Get-ChildItem Resources }
        Write-Host "---"
        Write-Host "Localization directory:"
        if (Test-Path Localization) { Get-ChildItem Localization }
        Write-Host "---"
        Write-Host "font_work directory:"
        if (Test-Path font_work) { Get-ChildItem font_work }
    
    - name: Setup absolute paths
      id: paths
      run: |
        $rootDir = Get-Location
        $bundlePath = Join-Path $rootDir "Resources\data.unity3d"
        $localizationPath = Join-Path $rootDir "Localization"
        $outputDir = Join-Path $rootDir "output"
        $outputPath = Join-Path $outputDir "data_localized.unity3d"
        $fontWorkPath = Join-Path $rootDir "font_work"
        
        Write-Host "Root directory: $rootDir"
        Write-Host "Bundle path: $bundlePath"
        Write-Host "Localization path: $localizationPath"
        Write-Host "Output directory: $outputDir"
        Write-Host "Output path: $outputPath"
        Write-Host "Font work path: $fontWorkPath"
        
        echo "ROOT_DIR=$rootDir" >> $env:GITHUB_OUTPUT
        echo "BUNDLE_PATH=$bundlePath" >> $env:GITHUB_OUTPUT
        echo "LOCALIZATION_PATH=$localizationPath" >> $env:GITHUB_OUTPUT
        echo "OUTPUT_DIR=$outputDir" >> $env:GITHUB_OUTPUT
        echo "OUTPUT_PATH=$outputPath" >> $env:GITHUB_OUTPUT
        echo "FONT_WORK_PATH=$fontWorkPath" >> $env:GITHUB_OUTPUT
    
    - name: Create output directory
      run: |
        New-Item -ItemType Directory -Force -Path "${{ steps.paths.outputs.OUTPUT_DIR }}"
    
    - name: Localize and replace fonts
      run: |
        $exeDir = Join-Path "${{ steps.paths.outputs.ROOT_DIR }}" "UnpackTerrariaTextAsset\bin\Release\net8.0"
        cd $exeDir
        Write-Host "Working directory: $(Get-Location)"
        Write-Host "Running command..."
        dotnet UnpackTerrariaTextAsset.dll -build "${{ steps.paths.outputs.BUNDLE_PATH }}" "${{ steps.paths.outputs.LOCALIZATION_PATH }}" "${{ steps.paths.outputs.FONT_WORK_PATH }}" "${{ steps.paths.outputs.OUTPUT_PATH }}"
        Write-Host "Command completed"
    
    - name: Debug - Check output
      run: |
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "---"
        Write-Host "All directories:"
        Get-ChildItem -Directory
        Write-Host "---"
        Write-Host "Checking for output directory:"
        if (Test-Path output) {
          Write-Host "output directory exists"
          Write-Host "Contents of output:"
          Get-ChildItem -Recurse output
        } else {
          Write-Host "output directory does NOT exist"
        }
        Write-Host "---"
        Write-Host "Checking all directories for data_localized.unity3d:"
        Get-ChildItem -Recurse -Filter "*.unity3d" -ErrorAction SilentlyContinue
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: localized-data-unity3d
        path: ${{ steps.paths.outputs.OUTPUT_PATH }}
        if-no-files-found: error